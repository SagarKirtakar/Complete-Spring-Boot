spring:
  application:
    name: bookapp-restjpa

  datasource:
    url: jdbc:mysql://localhost:3306/bookdb
    username: root
    password: pass@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /bookapp
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always