spring.application.name=ImageFileSystem

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/ImageDemo_db
spring.datasource.username=root
spring.datasource.password=Sagar@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Maximum size for a single uploaded file
spring.servlet.multipart.max-file-size=10MB

# Maximum size for the entire multipart request
spring.servlet.multipart.max-request-size=10MB